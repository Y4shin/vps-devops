---
- name: Deploy Traefik
  hosts: vps

  vars:
    repo_root: "{{ playbook_dir }}/.."

  tasks:
    - name: Set secrets variable
      ansible.builtin.set_fact:
        secrets: "{{ lookup('community.sops.sops', repo_root + '/secrets.sops.yaml') | from_yaml }}"
      no_log: true

    - name: Create Traefik directory
      ansible.builtin.file:
        path: /opt/vps-devops/traefik
        state: directory
        mode: "0755"

    - name: Ensure proxy network exists
      community.docker.docker_network:
        name: proxy
        ipam_config:
          - subnet: "{{ secrets.proxy_subnet }}"
      register: proxy_network_result

    - name: Render Traefik config
      ansible.builtin.template:
        src: "{{ repo_root }}/traefik/traefik.yml.j2"
        dest: /opt/vps-devops/traefik/traefik.yml
        mode: "0644"
      register: traefik_config_result

    - name: Render Traefik compose file
      ansible.builtin.template:
        src: "{{ repo_root }}/traefik/docker-compose.yml.j2"
        dest: /opt/vps-devops/traefik/docker-compose.yml
        mode: "0644"
      register: traefik_compose_result

    - name: Render CoreDNS config
      ansible.builtin.template:
        src: "{{ repo_root }}/traefik/Corefile.j2"
        dest: /opt/vps-devops/traefik/Corefile
        mode: "0644"
      register: coredns_config_result

    - name: Decide whether Traefik needs full recreate
      ansible.builtin.set_fact:
        traefik_needs_recreate: >-
          {{
            proxy_network_result.changed
            or traefik_config_result.changed
            or traefik_compose_result.changed
            or coredns_config_result.changed
          }}

    - name: Recreate Traefik when required
      community.docker.docker_compose_v2:
        project_src: /opt/vps-devops/traefik
        state: present
        recreate: always
      when: traefik_needs_recreate

    - name: Ensure Traefik is running without forced recreate
      community.docker.docker_compose_v2:
        project_src: /opt/vps-devops/traefik
        state: present
      when: not traefik_needs_recreate

    - name: Remove retired Traefik env artifacts
      ansible.builtin.file:
        path: /opt/vps-devops/traefik/.env
        state: absent
    - name: Remove retired Traefik env hash artifact
      ansible.builtin.file:
        path: /opt/vps-devops/traefik/.env.sha256
        state: absent
