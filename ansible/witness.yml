---
- name: Deploy Witness
  hosts: vps

  vars:
    repo_root: "{{ playbook_dir }}/.."
    borg_rsh: "ssh -i /home/deploy/.ssh/borg_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
    awscli_arch: "{{ 'x86_64' if ansible_facts['architecture'] == 'x86_64' else 'aarch64' }}"

  tasks:
    - name: Set secrets variables
      ansible.builtin.set_fact:
        secrets: "{{ lookup('community.sops.sops', repo_root + '/secrets.sops.yaml') | from_yaml }}"
        app_secrets: "{{ lookup('community.sops.sops', repo_root + '/reporting-tool/.env.sops.yaml') | from_yaml }}"
      no_log: true

    - name: Check whether AWS CLI is already installed
      ansible.builtin.command: aws --version
      register: awscli_installed
      failed_when: false
      changed_when: false
      become: true

    - name: Install unzip for AWS CLI bundle extraction
      ansible.builtin.apt:
        name:
          - unzip
        state: present
        update_cache: true
      when: awscli_installed.rc != 0
      become: true

    - name: Download AWS CLI bundle
      ansible.builtin.get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ awscli_arch }}.zip"
        dest: /tmp/awscliv2.zip
        mode: "0644"
      when: awscli_installed.rc != 0
      become: true

    - name: Extract AWS CLI bundle
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: awscli_installed.rc != 0
      become: true

    - name: Install AWS CLI
      ansible.builtin.command:
        cmd: /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
      when: awscli_installed.rc != 0
      become: true

    - name: Remove extracted AWS CLI bundle
      ansible.builtin.file:
        path: /tmp/aws
        state: absent
      when: awscli_installed.rc != 0
      become: true

    - name: Remove downloaded AWS CLI archive
      ansible.builtin.file:
        path: /tmp/awscliv2.zip
        state: absent
      when: awscli_installed.rc != 0
      become: true

    # -------------------------------------------------------------------------
    # Borg — SSH key, env file, and repo initialization
    # -------------------------------------------------------------------------
    - name: Set Borg repo URL
      ansible.builtin.set_fact:
        borg_repo: "ssh://{{ secrets.borg_user }}@{{ secrets.borg_host }}:23/{{ app_secrets.borg_path }}"
      no_log: true

    - name: Decrypt Borg SSH key to local temp file
      ansible.builtin.shell:
        cmd: sops -d --extract '["data"]' {{ repo_root }}/borg/ssh_key.sops > /tmp/borg_key_deploy
      environment:
        SOPS_AGE_KEY_FILE: "{{ repo_root }}/age.key"
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false

    - name: Deploy Borg SSH key
      ansible.builtin.copy:
        src: /tmp/borg_key_deploy
        dest: /home/deploy/.ssh/borg_key
        mode: "0600"
      no_log: true

    - name: Remove local temp Borg SSH key
      ansible.builtin.file:
        path: /tmp/borg_key_deploy
        state: absent
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Write reporting-tool Borg environment file
      ansible.builtin.copy:
        dest: /opt/vps-devops/scripts/reporting-tool-borg-env
        content: |
          export BORG_REPO="{{ borg_repo }}"
          export BORG_PASSPHRASE="{{ app_secrets.borg_passphrase }}"
          export BORG_RSH="{{ borg_rsh }}"
        mode: "0600"
      no_log: true

    - name: Check if Borg repo is already initialized
      ansible.builtin.command:
        cmd: borg info {{ borg_repo }}
      environment:
        BORG_PASSPHRASE: "{{ app_secrets.borg_passphrase }}"
        BORG_RSH: "{{ borg_rsh }}"
      register: borg_info
      failed_when: false
      changed_when: false
      no_log: true

    - name: Initialize Borg repository
      ansible.builtin.command:
        cmd: borg init --encryption=repokey {{ borg_repo }}
      environment:
        BORG_PASSPHRASE: "{{ app_secrets.borg_passphrase }}"
        BORG_RSH: "{{ borg_rsh }}"
      when: borg_info.rc != 0
      no_log: true

    # -------------------------------------------------------------------------
    # Witness — only deploy if commit has changed
    # -------------------------------------------------------------------------
    - name: Get current local submodule commit
      ansible.builtin.command:
        cmd: git rev-parse HEAD
        chdir: "{{ repo_root }}/reporting-tool/app"
      register: current_commit
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Get last deployed commit from server
      ansible.builtin.slurp:
        src: /opt/vps-devops/reporting-tool/.last-deployed-commit
      register: last_commit_file
      failed_when: false

    - name: Set last deployed commit fact
      ansible.builtin.set_fact:
        last_commit: "{{ last_commit_file.content | default('') | b64decode | trim }}"

    - name: Create witness directory
      ansible.builtin.file:
        path: /opt/vps-devops/reporting-tool
        state: directory
        mode: "0755"

    - name: Create reporting-tool backup staging directory
      ansible.builtin.file:
        path: /opt/vps-devops/backups/reporting-tool-staging
        state: directory
        mode: "0700"

    - name: Write reporting-tool backup environment file
      ansible.builtin.copy:
        dest: /opt/vps-devops/scripts/reporting-tool-backup-env
        content: |
          export REPORTING_TOOL_COMPOSE_DIR=/opt/vps-devops/reporting-tool
          export REPORTING_TOOL_CONTAINER=reporting-tool-app-1
          export REPORTING_TOOL_DB_VOLUME=reporting-tool_db_data
          export REPORTING_TOOL_STAGING_DIR=/opt/vps-devops/backups/reporting-tool-staging
          export S3_ENDPOINT={{ secrets.s3_endpoint }}
          export S3_BUCKET={{ secrets.s3_bucket }}
          export S3_REGION={{ secrets.s3_region }}
          export S3_ACCESS_KEY_ID={{ app_secrets.S3_ACCESS_KEY_ID }}
          export S3_SECRET_ACCESS_KEY={{ app_secrets.S3_SECRET_ACCESS_KEY }}
        mode: "0600"
      no_log: true

    - name: Render witness compose file
      ansible.builtin.template:
        src: "{{ repo_root }}/reporting-tool/docker-compose.yml.j2"
        dest: /opt/vps-devops/reporting-tool/docker-compose.yml
        mode: "0644"
      register: witness_compose_result

    - name: Set witness source change fact
      ansible.builtin.set_fact:
        witness_source_changed: "{{ current_commit.stdout != last_commit }}"

    - name: Sync app source to server
      ansible.posix.synchronize:
        src: "{{ repo_root }}/reporting-tool/app/"
        dest: /opt/vps-devops/reporting-tool/app/
        delete: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
      become: false
      when: witness_source_changed

    - name: Copy reporting-tool backup script
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/backup-reporting-tool.sh"
        dest: /opt/vps-devops/scripts/backup-reporting-tool.sh
        mode: "0750"

    - name: Copy reporting-tool restore script
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/restore-reporting-tool.sh"
        dest: /opt/vps-devops/scripts/restore-reporting-tool.sh
        mode: "0750"

    - name: Copy compatibility backup wrapper
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/backup.sh"
        dest: /opt/vps-devops/scripts/backup.sh
        mode: "0755"

    - name: Backup reporting-tool before deploy
      ansible.builtin.command:
        cmd: bash /opt/vps-devops/scripts/backup-reporting-tool.sh
      when: witness_source_changed and last_commit != ""

    - name: Build witness env content
      ansible.builtin.set_fact:
        witness_env_content: |
          ORIGIN=https://witness.{{ secrets.domain }}
          DATABASE_URL=file:/data/app.db
          SESSION_SECRET={{ app_secrets.SESSION_SECRET }}
          ADMIN_PASSWORD={{ app_secrets.ADMIN_PASSWORD }}
          LOG_PRETTY=false
          S3_ENDPOINT={{ secrets.s3_endpoint }}
          S3_BUCKET={{ secrets.s3_bucket }}
          S3_REGION={{ secrets.s3_region }}
          S3_ACCESS_KEY_ID={{ app_secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY={{ app_secrets.S3_SECRET_ACCESS_KEY }}
      no_log: true

    - name: Build witness env hash
      ansible.builtin.set_fact:
        witness_env_hash: "{{ witness_env_content | hash('sha256') }}"
      no_log: true

    - name: Read previous witness env hash
      ansible.builtin.slurp:
        src: /opt/vps-devops/reporting-tool/.env.sha256
      register: witness_env_hash_file
      failed_when: false
      no_log: true

    - name: Decide whether witness env changed
      ansible.builtin.set_fact:
        witness_env_changed: "{{ (witness_env_hash_file.content | default('') | b64decode | trim) != witness_env_hash }}"
      no_log: true

    - name: Deploy Witness with temporary .env
      block:
        - name: Write app .env
          ansible.builtin.copy:
            dest: /opt/vps-devops/reporting-tool/.env
            content: "{{ witness_env_content }}"
            mode: "0600"
          no_log: true

        - name: Store witness env hash
          ansible.builtin.copy:
            dest: /opt/vps-devops/reporting-tool/.env.sha256
            content: "{{ witness_env_hash }}\n"
            mode: "0600"
          no_log: true

        - name: Decide whether witness needs full recreate
          ansible.builtin.set_fact:
            witness_needs_recreate: >-
              {{
                witness_source_changed
                or witness_compose_result.changed
                or witness_env_changed
              }}

        - name: Build and recreate witness when source changed
          community.docker.docker_compose_v2:
            project_src: /opt/vps-devops/reporting-tool
            build: always
            state: present
            recreate: always
          when: witness_source_changed

        - name: Recreate witness when config changed
          community.docker.docker_compose_v2:
            project_src: /opt/vps-devops/reporting-tool
            state: present
            recreate: always
          when: not witness_source_changed and witness_needs_recreate

        - name: Ensure witness is running without forced recreate
          community.docker.docker_compose_v2:
            project_src: /opt/vps-devops/reporting-tool
            state: present
          when: not witness_needs_recreate

        - name: Record deployed commit
          ansible.builtin.copy:
            dest: /opt/vps-devops/reporting-tool/.last-deployed-commit
            content: "{{ current_commit.stdout }}"
            mode: "0644"
          when: witness_source_changed
      always:
        - name: Remove app .env
          ansible.builtin.file:
            path: /opt/vps-devops/reporting-tool/.env
            state: absent
