---
# =============================================================================
# VPS Bootstrap Playbook — Ubuntu 24.04
# Idempotent: safe to re-run at any time.
# Usage: ansible-playbook ansible/bootstrap.yml -i ansible/inventory.yml
# =============================================================================
- name: Bootstrap VPS
  hosts: vps
  gather_facts: true
  become: true

  vars:
    sops_version: "3.9.4"
    deploy_ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFzTDe2mjcDJ5zRtx00PQXplk/TPKcLr8H5xgMofqbnP vps-deploy"

  # ---------------------------------------------------------------------------
  # 1. System update
  # ---------------------------------------------------------------------------
  tasks:
    - name: apt update + full-upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        autoremove: true

    # ---------------------------------------------------------------------------
    # 2. Core packages
    # ---------------------------------------------------------------------------
    - name: Install core packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - ca-certificates
          - gnupg
          - lsb-release
          - borgbackup
          - unattended-upgrades
          - apt-listchanges
          - ufw
          - fail2ban
          - htop
          - jq
        state: present

    # ---------------------------------------------------------------------------
    # 3. Unattended upgrades (security patches only)
    # ---------------------------------------------------------------------------
    - name: Configure unattended-upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
        owner: root
        group: root
        mode: "0644"

    - name: Enable periodic upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start unattended-upgrades service
      ansible.builtin.service:
        name: unattended-upgrades
        enabled: true
        state: started

    # ---------------------------------------------------------------------------
    # 4. UFW firewall
    # ---------------------------------------------------------------------------
    - name: Set UFW default policies
      community.general.ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }

    - name: Open required ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "{{ item.comment }}"
      loop:
        - { port: "22",  comment: "SSH" }
        - { port: "80",  comment: "HTTP (Traefik)" }
        - { port: "443", comment: "HTTPS (Traefik)" }

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    # ---------------------------------------------------------------------------
    # 5. SSH hardening (drop-in config, does not touch sshd_config directly)
    # ---------------------------------------------------------------------------
    - name: Apply SSH hardening drop-in
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        content: |
          PermitRootLogin no
          PasswordAuthentication no
          PubkeyAuthentication yes
          AuthorizedKeysFile .ssh/authorized_keys
          X11Forwarding no
          AllowTcpForwarding no
          ClientAliveInterval 300
          ClientAliveCountMax 2
          MaxAuthTries 3
          LoginGraceTime 20
        owner: root
        group: root
        mode: "0600"
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Reload sshd

    # ---------------------------------------------------------------------------
    # 6. fail2ban
    # ---------------------------------------------------------------------------
    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/sshd.conf
        content: |
          [sshd]
          enabled = true
          port    = 22
          filter  = sshd
          maxretry = 5
          bantime  = 1h
          findtime = 10m
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started

    # ---------------------------------------------------------------------------
    # 7. Docker (official repo)
    # ---------------------------------------------------------------------------
    - name: Add Docker apt key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository (DEB822 format)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: true
        state: present

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    # ---------------------------------------------------------------------------
    # 8. sops
    # ---------------------------------------------------------------------------
    - name: Detect system architecture for sops
      ansible.builtin.set_fact:
        sops_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}"

    - name: Check if sops is already installed at target version
      ansible.builtin.command: sops --version
      register: sops_installed
      failed_when: false
      changed_when: false

    - name: Install sops
      ansible.builtin.apt:
        deb: "https://github.com/getsops/sops/releases/download/v{{ sops_version }}/sops_{{ sops_version }}_{{ sops_arch }}.deb"
      when: sops_version not in (sops_installed.stdout | default(''))

    # ---------------------------------------------------------------------------
    # 9. deploy user + directories
    # ---------------------------------------------------------------------------
    - name: Create deploy user
      ansible.builtin.user:
        name: deploy
        system: true
        create_home: true
        shell: /bin/bash
        groups: docker
        append: true

    - name: Create deploy user .ssh directory
      ansible.builtin.file:
        path: /home/deploy/.ssh
        state: directory
        owner: deploy
        group: deploy
        mode: "0700"

    - name: Add deploy public key
      ansible.posix.authorized_key:
        user: deploy
        key: "{{ deploy_ssh_pubkey }}"
        state: present

    - name: Create /opt/vps-devops/scripts
      ansible.builtin.file:
        path: /opt/vps-devops/scripts
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Create /opt/vps-devops
      ansible.builtin.file:
        path: /opt/vps-devops
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Create Borg backup directory
      ansible.builtin.file:
        path: /opt/borg-backups/reporting-tool
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"


  # ---------------------------------------------------------------------------
  # Handlers
  # ---------------------------------------------------------------------------
  handlers:
    - name: Reload sshd
      ansible.builtin.service:
        name: ssh
        state: reloaded

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
