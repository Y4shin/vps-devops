version: 1
metadata:
  name: conference-tool-groups-claim
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: conference-tool profile groups
    attrs:
      name: conference-tool profile groups
      scope_name: profile
      description: Emit only conference-* groups in the OIDC groups claim for conference-tool.
      expression: |
        return {
            "groups": [
                group.name
                for group in request.user.ak_groups.all()
                if group.name.startswith("conference-")
            ]
        }
