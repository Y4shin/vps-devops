version: '3'

env:
  ANSIBLE_CONFIG: ./ansible.cfg
  SOPS_AGE_KEY_FILE: ./age.key

tasks:
  decrypt:
    desc: Decrypt inventory
    cmds:
      - sops -d ansible/inventory.sops.yaml > ansible/inventory.yml

  bootstrap:
    desc: Minimal first-contact bootstrap (create deploy user + SSH access)
    cmds:
      - bash ./scripts/local/bootstrap.sh password

  deploy:base:
    desc: Configure base host services via deploy user + inventory-configured root escalation
    deps: [decrypt]
    cmds:
      - defer: rm -f ansible/inventory.yml
      - bash ./scripts/local/run-playbook.sh ansible/base.yml

  bootstrap:askpass:
    desc: One-time server setup using password auth (for servers without SSH key)
    cmds:
      - bash ./scripts/local/bootstrap.sh askpass

  deploy:
    desc: Deploy all services (Traefik + Witness)
    deps: [decrypt]
    cmds:
      - defer: rm -f ansible/inventory.yml
      - bash ./scripts/local/run-playbook.sh ansible/site.yml

  deploy:traefik:
    desc: Deploy Traefik only
    deps: [decrypt]
    cmds:
      - defer: rm -f ansible/inventory.yml
      - bash ./scripts/local/run-playbook.sh ansible/traefik.yml

  deploy:witness:
    desc: Deploy Witness only
    deps: [decrypt]
    cmds:
      - defer: rm -f ansible/inventory.yml
      - bash ./scripts/local/run-playbook.sh ansible/witness.yml

  all:
    desc: "Fresh-server flow: bootstrap, base config, then service deploy"
    cmds:
      - task: bootstrap
      - task: deploy:base
      - task: deploy

  install:sops:deb:
    desc: Install sops via .deb if not present or outdated (apt-based distros only)
    silent: true
    vars:
      SOPS_VERSION: v3.12.2
    cmds:
      - bash ./scripts/local/install-sops-deb.sh {{.SOPS_VERSION}}

  install:lefthook:deb:
    desc: Install lefthook via .deb if not present or outdated (apt-based distros only)
    silent: true
    vars:
      LEFTHOOK_VERSION: v2.1.4
    cmds:
      - bash ./scripts/local/install-lefthook-deb.sh {{.LEFTHOOK_VERSION}}

  install:yq:
    desc: Install yq (Mike Farah) if not present or outdated
    silent: true
    vars:
      YQ_VERSION: v4.52.4
    cmds:
      - bash ./scripts/local/install-yq.sh {{.YQ_VERSION}}

  setup:debian:trixie:
    desc: Install all dependencies for the control node (Debian Trixie)
    silent: true
    preconditions:
      - sh: test "$(uname -s)" = "Linux"
        msg: setup:debian:trixie only supports Linux hosts
      - sh: test -f /etc/os-release && . /etc/os-release && test "$ID" = "debian" && test "$VERSION_CODENAME" = "trixie"
        msg: setup:debian:trixie requires Debian Trixie
    vars:
      ANSIBLE_COLLECTIONS: community.sops community.docker community.general ansible.posix
    cmds:
      - echo "Installing system packages..."
      - sudo apt-get update && sudo apt-get install -y age borgbackup gnupg pipx openssh-client git rsync sshpass
      - task: install:sops:deb
      - task: install:yq
      - task: install:lefthook:deb
      - echo "Installing Ansible via pipx..."
      - pipx install ansible --include-deps
      - pipx ensurepath
      - echo "Installing Ansible collections..."
      - ~/.local/bin/ansible-galaxy collection install --upgrade --collections-path ./collections {{.ANSIBLE_COLLECTIONS}}
      - echo "Installing git hooks..."
      - lefthook install
      - task: check:unix

  check:unix:key:
    desc: Check age key is present in repo dir and fix its permissions
    silent: true
    cmds:
      - bash ./scripts/local/check-unix-key.sh

  check:unix:
    desc: Run all Unix environment checks
    silent: true
    cmds:
      - echo "Checking environment..."
      - lefthook install
      - task: check:unix:key
      - echo "All checks passed."

  ssh:
    desc: SSH into the server as deploy user
    cmds:
      - bash ./scripts/local/ssh-shell.sh

  ssh:reporting-tool-backup:
    desc: SSH into the server with reporting-tool Borg env loaded
    cmds:
      - bash ./scripts/local/ssh-shell.sh /opt/vps-devops/scripts /opt/vps-devops/scripts/reporting-tool-borg-env

  ssh:traefik:
    desc: SSH into the server and cd to the Traefik compose directory
    cmds:
      - bash ./scripts/local/ssh-shell.sh /opt/vps-devops/traefik

  ssh:witness:
    desc: SSH into the server and cd to the Witness compose directory
    cmds:
      - bash ./scripts/local/ssh-shell.sh /opt/vps-devops/reporting-tool

  ssh:scripts:
    desc: SSH into the server and cd to the scripts directory
    cmds:
      - bash ./scripts/local/ssh-shell.sh /opt/vps-devops/scripts

  ssh:backups:
    desc: SSH into the server and cd to the backups directory
    cmds:
      - bash ./scripts/local/ssh-shell.sh /opt/vps-devops/backups

  witness:backup:info:
    desc: Show Borg repo info and archive list for the witness backup repo
    cmds:
      - bash ./scripts/local/witness-backup-info.sh

  witness:backup:perform:
    desc: SSH to the VPS and run the witness backup script
    cmds:
      - bash ./scripts/local/ssh-run.sh "cd /opt/vps-devops/scripts && bash ./backup-reporting-tool.sh"

  witness:backup:restore:
    desc: "SSH to the VPS and run the witness restore script. Optionally pass ARCHIVE=<borg-archive-name>"
    cmds:
      - bash ./scripts/local/ssh-run.sh "cd /opt/vps-devops/scripts && bash ./restore-reporting-tool.sh {{if .ARCHIVE}}{{.ARCHIVE}}{{end}}"

  witness:up:
    desc: Start or recreate the Witness stack with a temporary env file
    cmds:
      - bash ./scripts/local/witness-compose.sh up

  witness:down:
    desc: Tear down the Witness stack with a temporary env file
    cmds:
      - bash ./scripts/local/witness-compose.sh down

  witness:start:
    desc: Start the existing Witness container without recreating it
    cmds:
      - bash ./scripts/local/ssh-run.sh docker start reporting-tool-app-1

  witness:stop:
    desc: Stop the existing Witness container without removing it
    cmds:
      - bash ./scripts/local/ssh-run.sh docker stop reporting-tool-app-1

  submodule:init:reporting-tool:
    desc: Initialize reporting-tool/app submodule using its deploy key (idempotent)
    cmds:
      - bash ./scripts/local/submodule.sh reporting-tool/deploy_key.sops reporting-tool/app init

  submodule:update:reporting-tool:
    desc: Update reporting-tool/app submodule using its deploy key
    deps: [submodule:init:reporting-tool]
    cmds:
      - bash ./scripts/local/submodule.sh reporting-tool/deploy_key.sops reporting-tool/app update
      - git add reporting-tool/app

  submodule:init:conference-tool:
    desc: Initialize conference-tool/app submodule using its deploy key (idempotent)
    cmds:
      - bash ./scripts/local/submodule.sh conference-tool/deploy_key.sops conference-tool/app init

  submodule:update:conference-tool:
    desc: Update conference-tool/app submodule using its deploy key
    deps: [submodule:init:conference-tool]
    cmds:
      - bash ./scripts/local/submodule.sh conference-tool/deploy_key.sops conference-tool/app update
      - git add conference-tool/app

  submodule:init:
    desc: Initialize all submodules using their deploy keys
    cmds:
      - task: submodule:init:reporting-tool
      - task: submodule:init:conference-tool

  submodule:update:
    desc: Pull latest commits for all submodules and stage changes
    cmds:
      - task: submodule:update:reporting-tool
      - task: submodule:update:conference-tool

  submodule:update:commit:
    desc: Pull latest commits for all submodules, stage, and commit
    cmds:
      - task: submodule:update
      - 'git commit -m "chore: bump submodule versions"'

  secrets:edit:
    desc: "Edit an encrypted secrets file. Usage: task secrets-edit FILE=secrets.sops.yaml"
    cmds:
      - sops {{.FILE}}

  secrets:overview:
    desc: Show a curated overview of selected decrypted secret values in a pager
    cmds:
      - bash ./scripts/local/secrets-overview.sh

  secrets:updatekeys:
    desc: Update recipients for all encrypted sops files to match .sops.yaml
    cmds:
      - find . -name '*.sops.yaml' -not -name '.sops.yaml' -exec sops updatekeys --yes {} \;
